schema_version: 1

project:
  name: "warikapp"
  type: "node"
  risk_level: "medium"
  owner: "yamk12nfu"

runtime:
  devcontainer: null

commands:
  setup: "npm ci"
  lint: "npm run lint"
  typecheck: "npx tsc --noEmit"
  test: ""
  build: "npm run build"

quality_gates:
  required:
    - lint
    - typecheck
    - build

ai:
  max_loops: 4
  max_changed_files: 10
  allowed_paths:
    - "app/**"
    - "convex/**"
    - "docs/**"
    - ".ai/local/knowledge/**"
  forbidden_paths:
    - ".env"
    - "secrets/**"
    - "infra/prod/**"
    - ".github/workflows/**"

review:
  create_pr: true
  require_human_review: true
  auto_merge: false

evals: {}
